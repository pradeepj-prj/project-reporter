# Discord bot configuration
# Bot token should be set via DISCORD_BOT_TOKEN environment variable

bot:
  command_prefix: "!"

posting:
  # Post a knowledge card every N hours
  interval_hours: 1

channels:
  # Map project names to Discord channel IDs
  talent-management: "1482338569954791486"
  project-reporter: "1482614810729386035"

threads:
  # Max exchanges before summarizing older messages
  max_exchanges: 30
  # Keep last N messages verbatim when summarizing
  keep_recent: 5
  # Target token count for summary of older messages
  summary_tokens: 500

reactions:
  # Emoji meanings
  got_it: "\U0001F44D"       # 👍
  explain_more: "\u2753"     # ❓
